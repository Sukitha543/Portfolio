  <link rel="stylesheet" href="styles/styles.css">
</head>

<body>
  <header class="nav">
    <div class="hamburger" id="hamburger">&#9776;</div>
    <nav class="nav-links" id="navLinks">
      <a href="#home">Home</a>
      <a href="#about">About Me</a>
      <a href="#mySkills">My Skills</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>
  <section id="home">
    <div class="hero">
    </div>
  </section>

  <section id="about">
    <h1>About Me</h1>
    <div class="about">
      <div class="myself">
        <p class="slide"></p>
      </div>
    </div>
  </section>

  <section id="mySkills">
    <h1>My Skills</h1>
    <div class="grid">
    </div>
  </section>

  <section id="projects">
    <h1>Projects</h1>
    <div class="projects-container">
    </div>
  </section>

  <section id="contact">
    <div class="contactForm">
      <h1>Contact</h1>
      <form action="https://formsubmit.co/a6d6795cd5496b5dbdde2d6daa7a1234" method="POST">
        <div class="mb-3">
          <label for="exampleFormControlInput1" class="form-label">Name</label>
          <input type="text" class="form-control" id="exampleFormControlInput1" name="name" placeholder="Jhon Doe"
            required>
        </div>
        <div class="mb-3">
          <label for="exampleFormControlInput1" class="form-label">Email address</label>
          <input type="email" class="form-control" id="exampleFormControlInput1" name="email"
            placeholder="name@example.com" required>
        </div>
        <div class="mb-3">
          <label for="exampleFormControlTextarea1" class="form-label"></label>
          <textarea class="form-control" id="exampleFormControlTextarea1" name="text"
            placeholder="Type your message here" rows="4" required></textarea>
        </div>
        <div class="mb-3">
          <label for="formFile" class="form-label">Attachments (If any)</label>
          <input class="form-control" type="file" id="formFile" name="attachments">
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
        <input type="hidden" name="_next" value="https://sukitha543.github.io/Portfolio//sucess.html">
        <input type="hidden" name="_subject" value="New Email">
      </form>
    </div>
  </section>
  <script src="script.js" defer></script>
